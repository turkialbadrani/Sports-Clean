workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - development
      cache:
        cache_paths:
          - $FLUTTER_ROOT/.pub-cache
          - ios/Pods
          - ~/.gradle/caches
          - ~/.gradle/wrapper

    scripts:
      - name: Clean and install dependencies
        script: |
          flutter clean
          flutter pub get
          cd ios
          rm -rf Pods Podfile.lock
          pod deintegrate
          pod setup
          pod repo update
          pod install
          cd ..

      # 👇 Build iOS Release IPA فقط
      - name: Build iOS Release IPA
        script: flutter build ipa --release --no-codesign

    artifacts:
      # iOS Release IPA
      - build/ios/ipa/*.ipa
