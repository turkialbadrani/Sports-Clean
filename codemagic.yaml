workflows:
  ios_release:
    name: iOS Release
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: 16.4
      cocoapods: default

    scripts:
      # ← هذا هو الـ Pre-build script
      - name: Reinstall CocoaPods (pre-build)
        script: |
          set -e
          flutter --version
          flutter clean
          flutter pub get
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks ios/Flutter/Flutter.podspec
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
          set -e
          flutter build ipa --release --no-tree-shake-icons

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    publishing:
      app_store_connect:
        submit_to_testflight: true
        # مفاتيح App Store Connect تظل مضافة من لوحة Codemagic (Team settings)
