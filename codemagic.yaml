workflows:
  debug-build:
    name: Debug & Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - development

    scripts:
      - name: Clean and install dependencies
        script: |
          flutter clean
          flutter pub get
          cd ios
          pod repo update
          pod install
          cd ..

      # 👇 Android Debug APK
      - name: Build Android Debug
        script: flutter build apk --debug

      # 👇 iOS Debug (Simulator فقط)
      - name: Build iOS Debug (Simulator)
        script: flutter build ios --debug --no-codesign

      # 👇 iOS Release (IPA للتوزيع اليدوي/TestFlight لاحقاً)
      - name: Build iOS Release IPA
        script: flutter build ipa --release --no-codesign

    artifacts:
      # Android APK
      - build/app/outputs/flutter-apk/app-debug.apk

      # iOS Simulator app
      - build/ios/iphonesimulator/*.app

      # iOS Release IPA
      - build/ios/ipa/*.ipa
