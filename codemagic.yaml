workflows:
  android-ios-build:
    name: Android & iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations: {} # تعطيل التكاملات التلقائية
    triggering: {} # تعطيل المشغلات التلقائية
    cache: # تعطيل الكاش
      cache_paths: []
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Clean and Install iOS dependencies
        script: |
          set -e
          cd ios
          rm -rf Pods Podfile.lock
          pod cache clean --all
          pod repo update
          pod install
      - name: Build Android APK
        script: flutter build apk --debug
      - name: Build iOS App
        script: flutter build ios --debug --no-codesigning
    artifacts:
      - build/app/outputs/apk/debug/*.apk
      - build/ios/iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - your_email@example.com # <-- تأكد من إيميلك
