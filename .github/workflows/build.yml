name: Build Flutter App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Get Flutter packages
        run: flutter pub get

      # --- هذا هو القسم الذي تم تعديله ---
      - name: Prepare iOS project and install dependencies
        run: |
          # هذا الأمر سيقوم بإنشاء Podfile وكل الإعدادات اللازمة
          flutter build ios --simulator --no-codesign 
          # الآن يمكننا تشغيل pod install بأمان (كخطوة تأكيدية)
          cd ios
          pod install

      - name: Build Android APK (Debug)
        run: flutter build apk --debug

      - name: Upload iOS Artifact
        # المسار الصحيح بعد البناء
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphonesimulator/*.app

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
