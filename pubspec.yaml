name: today_smart
description: Today Smart fixtures viewer (Arabic) for SPL, EPL, LaLiga with robust fallbacks.
publish_to: "none"
 "version: $($args[0].Groups[1].Value)+$([int]$args[0].Groups[2].Value + 1)" 

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2
  shimmer: ^3.0.0

  # ✅ FlutterFire (سلاسل حديثة متوافقة مع GoogleSignIn 8 و iOS CocoaPods)
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.0.1
  google_sign_in: ^7.2.0

  # Core
  http: ^1.2.2
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  flutter_dotenv: ^5.2.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Local Notifications
  flutter_local_notifications: ^17.2.4

  # من V2
  auto_size_text: ^3.0.0
  share_plus: ^7.2.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  intl: 0.19.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/app_icon.png
    - assets/localization/teams_ar.json
    - assets/localization/players_ar.json
    - assets/localization/leagues_ar.json
    - assets/card_data.json
    - assets/images/backgrounds/
    - assets/logos/
    - assets/localization/preferred_leagues.json
    - assets/localization/countries_ar.json
    - assets/localization/leagues_extended.json

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
